name: Publish to crates.io

on:
  workflow_call:
    secrets:
      CRATES_TOKEN:
        required: true
      BOT_GITHUB_TOKEN:
        required: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.90.0
    - name: Publish to crates.io.
      run: |
        VERSION=$(cargo pkgid -p qm 2>/dev/null | sed 's/.*@//')
        echo "Version: $VERSION"
        for crate in qm-utils-derive qm-utils qm-role-build qm-role qm-pg qm-redis qm-mongodb qm-s3 qm-kafka qm-nats qm-keycloak qm-entity-derive qm-entity qm-server qm; do
          if curl -s -4 --fail-with-body \
                -H "User-Agent: github-actions/${GITHUB_REPOSITORY}" \
                "https://crates.io/api/v1/crates/${crate}/versions" \
                | jq -e --arg v "${VERSION}" '.versions[] | select(.num == $v) | .num' > /dev/null; then
            echo "Skipping $crate - already published ($VERSION)"
          else
            cargo publish --token ${CRATES_TOKEN} -p "$crate"
          fi
        done
      env:
        CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
        SQLX_OFFLINE: true
  release:
    name: Release on GitHub
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Create a Release
        uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        with:
          title: Release ${{ github.ref_name }}
          tag: ${{ github.ref }}